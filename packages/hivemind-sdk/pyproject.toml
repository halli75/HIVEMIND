[project]
name = "hivemind-sdk"
version = "0.1.0"
description = "Local-first SDK primitives for HIVEMIND swarm simulations."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.25",
    "cryptography>=42",
]

[project.optional-dependencies]
crystallize = [
    "web3>=6.20",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
