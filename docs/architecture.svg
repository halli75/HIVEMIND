<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e2e8f0"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-seed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
      .subtitle { fill: #94a3b8; font-size: 13px; font-weight: 400; }
      .lane-label { fill: #cbd5e1; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
      .box-title { fill: #f8fafc; font-size: 13px; font-weight: 600; }
      .box-sub { fill: #cbd5e1; font-size: 10.5px; font-weight: 400; }
      .arrow-label { fill: #e2e8f0; font-size: 10px; font-weight: 500; }
      .arrow-label-gold { fill: #fbbf24; font-size: 10px; font-weight: 600; }
      .seed-label { fill: #c4b5fd; font-size: 10px; font-weight: 500; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0f1117"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" class="title">HIVEMIND — DeFi Swarm Intelligence Engine</text>
  <text x="600" y="52" text-anchor="middle" class="subtitle">EthGlobal OpenAgents Hackathon</text>

  <!-- =================== LANE 1: FRONTEND =================== -->
  <rect x="20" y="72" width="1160" height="138" rx="10" fill="#1e3a5f" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35"/>
  <text x="35" y="92" class="lane-label">Frontend</text>

  <!-- Frontend boxes (5 across) -->
  <g>
    <rect x="50" y="110" width="200" height="80" rx="8" fill="#2a3f5f" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="150" y="140" text-anchor="middle" class="box-title">Browser UI</text>
    <text x="150" y="160" text-anchor="middle" class="box-sub">React + Vite</text>
    <text x="150" y="174" text-anchor="middle" class="box-sub">apps/web</text>
  </g>
  <g>
    <rect x="270" y="110" width="200" height="80" rx="8" fill="#2a3f5f" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="370" y="140" text-anchor="middle" class="box-title">Sigma.js Force-Graph</text>
    <text x="370" y="160" text-anchor="middle" class="box-sub">live agent network</text>
    <text x="370" y="174" text-anchor="middle" class="box-sub">visualization</text>
  </g>
  <g>
    <rect x="490" y="110" width="200" height="80" rx="8" fill="#2a3f5f" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="590" y="140" text-anchor="middle" class="box-title">Inference Metrics</text>
    <text x="590" y="160" text-anchor="middle" class="box-sub">Tier 1/2/3 latency,</text>
    <text x="590" y="174" text-anchor="middle" class="box-sub">token bucket, AIQ</text>
  </g>
  <g>
    <rect x="710" y="110" width="200" height="80" rx="8" fill="#2a3f5f" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="810" y="140" text-anchor="middle" class="box-title">Scenario Injector</text>
    <text x="810" y="160" text-anchor="middle" class="box-sub">natural-language</text>
    <text x="810" y="174" text-anchor="middle" class="box-sub">market events</text>
  </g>
  <g>
    <rect x="930" y="110" width="220" height="80" rx="8" fill="#2a3f5f" stroke="#60a5fa" stroke-width="1.2"/>
    <text x="1040" y="140" text-anchor="middle" class="box-title">Leaderboard</text>
    <text x="1040" y="160" text-anchor="middle" class="box-sub">+ Crystallize button</text>
    <text x="1040" y="174" text-anchor="middle" class="box-sub">(mints winning agent)</text>
  </g>

  <!-- =================== LANE 2: BACKEND / SDK =================== -->
  <rect x="20" y="230" width="1160" height="148" rx="10" fill="#1a2e1a" fill-opacity="0.6" stroke="#22c55e" stroke-opacity="0.35"/>
  <text x="35" y="250" class="lane-label">Backend / SDK</text>

  <g>
    <rect x="50" y="268" width="220" height="92" rx="8" fill="#1f3a1f" stroke="#4ade80" stroke-width="1.2"/>
    <text x="160" y="298" text-anchor="middle" class="box-title">FastAPI Server</text>
    <text x="160" y="318" text-anchor="middle" class="box-sub">REST + WebSocket</text>
    <text x="160" y="332" text-anchor="middle" class="box-sub">/scenario  /state</text>
    <text x="160" y="346" text-anchor="middle" class="box-sub">/leaderboard  /crystallize</text>
  </g>
  <g>
    <rect x="290" y="268" width="270" height="92" rx="8" fill="#1f3a1f" stroke="#4ade80" stroke-width="1.5"/>
    <text x="425" y="294" text-anchor="middle" class="box-title">SwarmEngine</text>
    <text x="425" y="312" text-anchor="middle" class="box-sub">orchestrator + agent roster</text>
    <rect x="305" y="322" width="240" height="30" rx="5" fill="#0f1117" stroke="#22c55e" stroke-opacity="0.5"/>
    <text x="425" y="341" text-anchor="middle" class="box-sub" font-weight="600" fill="#86efac">3-tier: AIQ / Heuristic / Background</text>
  </g>
  <g>
    <rect x="580" y="268" width="220" height="92" rx="8" fill="#1f3a1f" stroke="#4ade80" stroke-width="1.2"/>
    <text x="690" y="298" text-anchor="middle" class="box-title">ScoringEngine</text>
    <text x="690" y="318" text-anchor="middle" class="box-sub">confidence × pnl ×</text>
    <text x="690" y="332" text-anchor="middle" class="box-sub">aiq × tier rubric</text>
    <text x="690" y="348" text-anchor="middle" class="box-sub">Sharpe / drawdown</text>
  </g>
  <g>
    <rect x="820" y="268" width="320" height="92" rx="8" fill="#1f3a1f" stroke="#4ade80" stroke-width="1.2"/>
    <text x="980" y="298" text-anchor="middle" class="box-title">CrystallizationPipeline</text>
    <text x="980" y="318" text-anchor="middle" class="box-sub">freezes top agent's strategy</text>
    <text x="980" y="332" text-anchor="middle" class="box-sub">→ encrypts → uploads → mints iNFT</text>
    <text x="980" y="348" text-anchor="middle" class="box-sub">→ executes winning Uniswap trade</text>
  </g>

  <!-- =================== LANE 3: EXTERNAL SERVICES (sponsors) =================== -->
  <rect x="20" y="398" width="1160" height="148" rx="10" fill="#2d1b00" fill-opacity="0.6" stroke="#f59e0b" stroke-opacity="0.4"/>
  <text x="35" y="418" class="lane-label">External Services</text>

  <g>
    <rect x="50" y="436" width="200" height="92" rx="8" fill="#3a2510" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="464" text-anchor="middle" class="box-title">0G Compute</text>
    <text x="150" y="484" text-anchor="middle" class="box-sub">AI inference for</text>
    <text x="150" y="498" text-anchor="middle" class="box-sub">Tier 1 agents</text>
    <text x="150" y="516" text-anchor="middle" class="box-sub" fill="#fbbf24">[sponsor]</text>
  </g>
  <g>
    <rect x="270" y="436" width="200" height="92" rx="8" fill="#3a2510" stroke="#f59e0b" stroke-width="2"/>
    <text x="370" y="464" text-anchor="middle" class="box-title">0G Storage</text>
    <text x="370" y="484" text-anchor="middle" class="box-sub">agent memory +</text>
    <text x="370" y="498" text-anchor="middle" class="box-sub">encrypted strategy</text>
    <text x="370" y="516" text-anchor="middle" class="box-sub" fill="#fbbf24">[sponsor]</text>
  </g>
  <g>
    <rect x="490" y="436" width="200" height="92" rx="8" fill="#3a2510" stroke="#f59e0b" stroke-width="2"/>
    <text x="590" y="464" text-anchor="middle" class="box-title">0G Chain</text>
    <text x="590" y="484" text-anchor="middle" class="box-sub">iNFT mint</text>
    <text x="590" y="498" text-anchor="middle" class="box-sub">(HivemindINFT.sol)</text>
    <text x="590" y="516" text-anchor="middle" class="box-sub" fill="#fbbf24">[sponsor]</text>
  </g>
  <g>
    <rect x="710" y="436" width="220" height="92" rx="8" fill="#3a2510" stroke="#f59e0b" stroke-width="2"/>
    <text x="820" y="464" text-anchor="middle" class="box-title">Gensyn AXL</text>
    <text x="820" y="484" text-anchor="middle" class="box-sub">P2P agent messaging</text>
    <text x="820" y="498" text-anchor="middle" class="box-sub">36k msgs/sec</text>
    <text x="820" y="516" text-anchor="middle" class="box-sub" fill="#fbbf24">[sponsor]</text>
  </g>
  <g>
    <rect x="950" y="436" width="200" height="92" rx="8" fill="#3a2510" stroke="#f59e0b" stroke-width="2"/>
    <text x="1050" y="464" text-anchor="middle" class="box-title">Uniswap API</text>
    <text x="1050" y="484" text-anchor="middle" class="box-sub">Sepolia swap</text>
    <text x="1050" y="498" text-anchor="middle" class="box-sub">execution</text>
    <text x="1050" y="516" text-anchor="middle" class="box-sub" fill="#fbbf24">[sponsor]</text>
  </g>

  <!-- =================== LANE 4: DATA =================== -->
  <rect x="20" y="566" width="1160" height="200" rx="10" fill="#1a1a2e" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.35"/>
  <text x="35" y="586" class="lane-label">Data — deterministic seed snapshots</text>

  <g>
    <rect x="50" y="610" width="170" height="64" rx="8" fill="#252540" stroke="#818cf8" stroke-width="1.2"/>
    <text x="135" y="636" text-anchor="middle" class="box-title">uniswap_pools</text>
    <text x="135" y="654" text-anchor="middle" class="box-sub">pool snapshots</text>
  </g>
  <g>
    <rect x="240" y="610" width="170" height="64" rx="8" fill="#252540" stroke="#818cf8" stroke-width="1.2"/>
    <text x="325" y="636" text-anchor="middle" class="box-title">eth_price_ohlcv_90d</text>
    <text x="325" y="654" text-anchor="middle" class="box-sub">price candles</text>
  </g>
  <g>
    <rect x="430" y="610" width="170" height="64" rx="8" fill="#252540" stroke="#818cf8" stroke-width="1.2"/>
    <text x="515" y="636" text-anchor="middle" class="box-title">usdc_peg_events</text>
    <text x="515" y="654" text-anchor="middle" class="box-sub">stablecoin peg log</text>
  </g>
  <g>
    <rect x="620" y="610" width="170" height="64" rx="8" fill="#252540" stroke="#818cf8" stroke-width="1.2"/>
    <text x="705" y="636" text-anchor="middle" class="box-title">whale_txs</text>
    <text x="705" y="654" text-anchor="middle" class="box-sub">large-holder moves</text>
  </g>
  <g>
    <rect x="810" y="610" width="170" height="64" rx="8" fill="#252540" stroke="#818cf8" stroke-width="1.2"/>
    <text x="895" y="636" text-anchor="middle" class="box-title">lp_events</text>
    <text x="895" y="654" text-anchor="middle" class="box-sub">liquidity provider feed</text>
  </g>
  <g>
    <rect x="1000" y="610" width="170" height="64" rx="8" fill="#252540" stroke="#818cf8" stroke-width="1.2"/>
    <text x="1085" y="636" text-anchor="middle" class="box-title">mev_arb_latency</text>
    <text x="1085" y="654" text-anchor="middle" class="box-sub">arb timing data</text>
  </g>

  <!-- =================== ARROWS =================== -->

  <!-- Lane 1 → Lane 2: WebSocket from UI down to FastAPI -->
  <path d="M 150 190 L 150 268" stroke="#e2e8f0" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="158" y="225" class="arrow-label">WebSocket</text>
  <text x="158" y="240" class="arrow-label">→ FastAPI</text>

  <!-- Lane 2 horizontal flow: FastAPI → SwarmEngine → ScoringEngine → CrystallizationPipeline -->
  <path d="M 270 314 L 290 314" stroke="#e2e8f0" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M 560 314 L 580 314" stroke="#e2e8f0" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M 800 314 L 820 314" stroke="#e2e8f0" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- SwarmEngine (425, 360 bottom) → 0G Compute (150, 436) -->
  <path d="M 380 360 Q 380 398 280 420 L 180 436" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow-gold)" opacity="0.95"/>
  <text x="245" y="392" class="arrow-label-gold">inference (Tier 1)</text>

  <!-- SwarmEngine → 0G Storage (370, 436) — read/write agent state -->
  <path d="M 410 360 L 360 436" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow-gold)" opacity="0.95"/>
  <text x="320" y="400" class="arrow-label-gold">read/write state</text>

  <!-- SwarmEngine ↔ Gensyn AXL (820, 436) — bidirectional -->
  <path d="M 460 360 L 800 436" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow-gold)" marker-start="url(#arrow-gold)" opacity="0.95"/>
  <text x="600" y="395" class="arrow-label-gold">broadcast / receive (TRADE_INTENT, MARKET_SIGNAL)</text>

  <!-- CrystallizationPipeline (980, 360 bottom) → 0G Storage (370, 436) -->
  <path d="M 880 360 Q 720 395 460 432" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow-gold)" opacity="0.95"/>
  <text x="690" y="380" class="arrow-label-gold">upload encrypted strategy</text>

  <!-- CrystallizationPipeline → 0G Chain (590, 436) -->
  <path d="M 950 360 L 620 436" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow-gold)" opacity="0.95"/>
  <text x="775" y="412" class="arrow-label-gold">mint iNFT</text>

  <!-- CrystallizationPipeline → Uniswap API (1050, 436) -->
  <path d="M 1050 360 L 1050 436" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow-gold)" opacity="0.95"/>
  <text x="1058" y="400" class="arrow-label-gold">execute trade</text>

  <!-- Data → SwarmEngine: routed up the LEFT margin to avoid crossing Lane 3 -->
  <path d="M 35 610 L 35 314 L 290 314" stroke="#a78bfa" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-seed)" opacity="0.9"/>
  <text x="42" y="550" class="seed-label">seed data</text>
  <text x="42" y="564" class="seed-label">→ SwarmEngine</text>
  <text x="42" y="578" class="seed-label">at startup</text>

  <!-- Small visual cue: brackets pulling all data boxes together toward the seed arrow -->
  <path d="M 135 610 L 135 596 L 35 596" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.55"/>
  <path d="M 325 610 L 325 596 L 35 596" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.45"/>
  <path d="M 515 610 L 515 596 L 35 596" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.4"/>
  <path d="M 705 610 L 705 596 L 35 596" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.35"/>
  <path d="M 895 610 L 895 596 L 35 596" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.3"/>
  <path d="M 1085 610 L 1085 596 L 35 596" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3" fill="none" opacity="0.25"/>

  <!-- Footer legend -->
  <g transform="translate(20, 778)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#3a2510" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="20" y="9" class="box-sub">Sponsor integration</text>
    <line x1="160" y1="5" x2="190" y2="5" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#arrow-gold)"/>
    <text x="200" y="9" class="box-sub">Live call</text>
    <line x1="260" y1="5" x2="290" y2="5" stroke="#a78bfa" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrow-seed)"/>
    <text x="300" y="9" class="box-sub">Seed-time load</text>
  </g>
</svg>
